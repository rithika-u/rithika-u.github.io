name: Update arXiv Papers

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch papers and update cache
        run: |
          cat > update_papers.js << 'EOF'
          const https = require('https');
          const fs = require('fs');
          
          function fetchArXivPapers() {
            const categories = ['cs.AI', 'cs.LG', 'stat.ML'];
            const categoryQuery = categories.map(cat => `cat:${cat}`).join('+OR+');
            const url = `https://export.arxiv.org/api/query?search_query=${categoryQuery}&start=0&max_results=50&sortBy=submittedDate&sortOrder=descending`;
            
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  const papers = parseArXivResponse(data);
                  const cacheData = {
                    papers,
                    timestamp: new Date().toISOString(),
                  };
                  fs.writeFileSync('data/papers.json', JSON.stringify(cacheData, null, 2));
                  console.log(`Successfully fetched and cached ${papers.length} papers`);
                  resolve();
                });
              }).on('error', reject);
            });
          }
          
          function parseArXivResponse(xmlText) {
            const papers = [];
            const idMatches = xmlText.matchAll(/id>.*?\/abs\/(\d+\.\d+)</g);
            const titleMatches = xmlText.matchAll(/<title>(.*?)<\/title>/g);
            const authorMatches = xmlText.matchAll(/<name>(.*?)<\/name>/g);
            const summaryMatches = xmlText.matchAll(/<summary>(.*?)<\/summary>/g);
            const publishedMatches = xmlText.matchAll(/<published>(.*?)<\/published>/g);
            const categoryMatches = xmlText.matchAll(/primary_category term="(.*?)"/g);
            
            const ids = Array.from(idMatches).map(m => m[1]);
            const titles = Array.from(titleMatches).map(m => m[1].replace(/\n/g, ' ').trim());
            const summaries = Array.from(summaryMatches).map(m => m[1].replace(/\n/g, ' ').trim());
            const published = Array.from(publishedMatches).map(m => m[1]);
            const categories = Array.from(categoryMatches).map(m => m[1]);
            
            for (let i = 0; i < Math.min(ids.length, titles.length); i++) {
              papers.push({
                id: ids[i],
                title: titles[i] || '',
                summary: summaries[i] || '',
                published: published[i] || '',
                category: categories[i] || 'General',
                url: `https://arxiv.org/abs/${ids[i]}`,
                pdfUrl: `https://arxiv.org/pdf/${ids[i]}.pdf`,
              });
            }
            
            return papers;
          }
          
          fetchArXivPapers().catch(err => {
            console.error('Error:', err);
            process.exit(1);
          });
          EOF
          
          mkdir -p data
          node update_papers.js
          rm update_papers.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/papers.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update arxiv papers - $(date)" && git push)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          cname: rithika-u.github.io
